<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dom practice </title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

    *{
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      font-family: "Rubik", sans-serif;

    }
    body{
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
    }
    .calculator{
      padding: 20%;
      border-radius: 16px;
      background-color: #2d2f38 ;
      box-shadow: 0px 3px 15px rgba(0 0 0 0.2);
      border: 2px solid aqua;

    }
    .display{
      padding: 0px 0 15px 0;
      width: 80%;

    }
    input{
      width: 85%;
      height: 90px;
      text-align: right;
      font-size: 40PX;
      background: transparent;
        box-shadow: -8px -8px 15px rgba(255, 255, 255, 0.1);
      color: #ffff;
      text-color: white;
      color: #fff;
    }
      
    .buttons {
     width: 80%;
     
     
    }
    button{
     padding: 20px;
     margin: 4px;
     width: 70px;
     height: 70px;
     border-radius: 50px;
     background: transparent;
      box-shadow: -8px -8px 15px rgba(255, 255, 255, 0.1);
      color: #ffff;
      font-size: 25px;
      opacity: 0.9;
      cursor: pointer;

    }
    .equalButton{
      background-color: orange;
      color: black;
    }
    .redbutton{
      background-color: red;
    }
    .operator{
      color: green;
    }
  
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <input id="inputBox" type="text" placeholder="0">
    </div>
    <div class="buttons">
      <div>
        <button class="redbutton">C</button>
        <button class="operator">%</button>
        <button class="operator">/</button>
        <button>AC</button>
      </div>
        <div>
          <button>7</button>
          <button>8</button>
          <button>9</button>
          <button class="operator" >-</button>
        </div>
        <div>
          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button class="operator">+</button>
        </div>
        <div>
          <button>00</button>
          <button>0</button>
          <button>.</button>
          <button class="equalButton">=</button>
        </div>
      
    </div>
  </div>

</body>
</html>
